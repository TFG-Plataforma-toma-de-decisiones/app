services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=configurador_db
      - POSTGRES_USER=configurador_user
      - POSTGRES_PASSWORD=1234
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend.dev
    environment:
      RESET_DB: ${RESET_DB:-false}
      TESTING: ${TESTING:-False}
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend.dev
    volumes:
      - ../frontend:/app
      - /app/node_modules 
    ports:
      - "5173:5173"
    depends_on:
      - web
  celery_worker:
    build: 
      context: ../
      dockerfile: docker/Dockerfile.backend.dev
    # Le añadimos .celery para que apunte directo al archivo
    command: bash -c "cd /app && celery -A backend.celery worker -l info" 
    volumes:
      - ../backend:/app
    depends_on:
      - redis
      - db
    env_file:
      - ../backend/.env
    environment:
      TESTING: ${TESTING:-False}
volumes:
  postgres_data:
