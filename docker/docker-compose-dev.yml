version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=configurador_db
      - POSTGRES_USER=configurador_user
      - POSTGRES_PASSWORD=1234
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend.dev
    command: >
      bash -c "python manage.py makemigrations 
      && python manage.py migrate 
      && python manage.py createsuperuser --noinput || true 
      && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend.dev
    volumes:
      - ../frontend:/app
      - /app/node_modules 
    ports:
      - "5173:5173"
    depends_on:
      - web
volumes:
  postgres_data: