services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend.prod
    restart: always 
    env_file:
      - ../backend/.env
    depends_on:
      - redis

  celery_worker:
    build: 
      context: ../
      dockerfile: docker/Dockerfile.backend.prod
    restart: always # ¡Añadido!
    command: bash -c "cd /app && celery -A backend.celery worker" 
    depends_on:
      - redis
    env_file:
      - ../backend/.env

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    command: caddy reverse-proxy --from backend-tfg.duckdns.org --to web:8000