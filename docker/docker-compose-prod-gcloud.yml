services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend.prod
    restart: always 
    env_file:
      - ../backend/.env
    depends_on:
      - redis
      - cloud-sql-proxy

  celery_worker:
    build: 
      context: ../
      dockerfile: docker/Dockerfile.backend.prod
    restart: always
    command: bash -c "cd /app && celery -A backend.celery worker" 
    depends_on:
      - redis
      - cloud-sql-proxy 
    env_file:
      - ../backend/.env

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    command: caddy reverse-proxy --from backend-tfg.duckdns.org --to web:8000

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
    restart: always
    env_file:
      - ../backend/.env
    command:
      - "--port=5432"
      - "--address=0.0.0.0"
      - "${CLOUD_SQL_CONNECTION_NAME}" 